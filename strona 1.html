<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>xClient Hub | Official</title>
    <style>
        :root {
            --primary-yellow: #f3e210;
            --mc-green: #52ad2d;
            --yt-red: #ff0000;
            --bg-dark: #0f0f0f;
            --card-bg: #1a1a1a;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: radial-gradient(circle, #1e1e1e 0%, #0a0a0a 100%);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: white;
        }

        .container {
            text-align: center;
            padding: 40px;
            background: rgba(26, 26, 26, 0.8);
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            border: 1px solid #333;
        }

        /* Logo Discord (Współpraca) */
        .logo-link {
            margin-bottom: 30px;
            display: inline-block;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .logo-link:hover {
            transform: scale(1.1) rotate(-2deg);
        }
        .logo-link img {
            max-width: 300px;
            height: auto;
        }

        /* Sekcja MEDIA - POWIĘKSZONA */
        .media-section {
            margin-bottom: 40px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
        }
        .media-label {
            display: block;
            font-weight: 900;
            font-size: 18px;
            color: var(--primary-yellow);
            margin-bottom: 15px;
            letter-spacing: 5px;
            text-transform: uppercase;
        }
        .yt-link img {
            width: 120px; /* Znacznie powiększona ikonka */
            height: auto;
            transition: all 0.3s ease;
            filter: drop-shadow(0 0 10px rgba(255, 0, 0, 0.4));
        }
        .yt-link:hover img {
            transform: scale(1.15);
            filter: drop-shadow(0 0 20px rgba(255, 0, 0, 0.7));
        }

        /* Główny przycisk Wybierz */
        .main-btn {
            padding: 25px 80px;
            background-color: var(--primary-yellow);
            color: #000;
            text-decoration: none;
            font-weight: 900;
            font-size: 28px;
            border-radius: 12px;
            cursor: pointer;
            border: none;
            box-shadow: 0 8px 0 #bcae0a;
            text-transform: uppercase;
            transition: all 0.1s;
        }
        .main-btn:hover {
            background-color: #fff120;
            transform: translateY(-2px);
            box-shadow: 0 10px 0 #bcae0a;
        }
        .main-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #bcae0a;
        }

        /* Modal (Pop-up) */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(8px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 20px;
            width: 400px;
            text-align: center;
            border: 2px solid var(--primary-yellow);
        }
        .download-list { margin-top: 25px; }
        .download-item {
            display: block;
            padding: 20px;
            margin: 15px 0;
            background: #252525;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-weight: bold;
            font-size: 18px;
            transition: all 0.2s;
            border-left: 5px solid transparent;
        }
        .download-item:hover:not(.disabled) {
            background: #333;
            border-left: 5px solid var(--mc-green);
            color: var(--mc-green);
            transform: translateX(10px);
        }
        .disabled {
            opacity: 0.3;
            cursor: not-allowed;
            border-left: 5px solid #555;
        }
        .close-btn {
            margin-top: 20px;
            background: none;
            border: none;
            color: #ff4d4d;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="container">
        <a href="https://discord.gg/DhF7TBcru2" class="logo-link" title="Wejdź na Discorda">
            <img src="https://see.fontimg.com/api/rf5/VGORe/YTQ1NWU1ODA5Y2NmNDgyODkxZjg5MjdiZWQ2ZmFlMjQub3Rm/MzNtYy5wbA/minecraft-ten.png?r=fs&h=65&w=1000&fg=F3E210&bg=FFFFFF&tb=1&s=65" alt="Minecraft Logo">
        </a>

        <div class="media-section">
            <span class="media-label">NASZE MEDIA</span>
            <a href="https://www.youtube.com/@xPatrysiakGames" target="_blank" class="yt-link">
                <img src="https://arkadiuszpodlaski.pl/wp-content/uploads/2014/05/youtube.png" alt="YouTube">
            </a>
        </div>

        <button class="main-btn" onclick="openModal()">Wybierz Wersję</button>
    </div>

    <div id="downloadModal" class="modal-overlay">
        <div class="modal-content">
            <h2 style="color: var(--primary-yellow); margin: 0; letter-spacing: 2px;">POBIERANIE</h2>
            <div class="download-list">
                <a href="https://www.mediafire.com/file/i838dudapwcg4ar/xClient_Launcher+V2.exe/file" class="download-item">
                    🚀 XCLIENT 2.0
                </a>
                <div class="download-item disabled">
                    🔒 AUTO CLICKER (SOON)
                </div>
            </div>
            <button class="close-btn" onclick="closeModal()">[ Zamknij okno ]</button>
        </div>
    </div>

    <script>
        const modal = document.getElementById('downloadModal');
        function openModal() { modal.style.display = 'flex'; }
        function closeModal() { modal.style.display = 'none'; }
        window.onclick = function(event) { if (event.target == modal) closeModal(); }
    </script>

</body>
</html>
